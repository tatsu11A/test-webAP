<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <!-- Thymeleaf用のテンプレートであることを宣言 -->
    <head>
        <!--設定-->
        <meta charset="UTF-8">
        <title>タスク管理アプリケーション</title>
        <link th:href="@{/home.css}" rel="stylesheet" />
    </head>

    <body>
        <div class="container"></div>
        <h1>タスク管理アプリケーション</h1>

        <div class ="task_form">
            <h2>タスクの登録</h2>
            <form action="/add">
                <label>タスク</label>
                <input name="task" type="text" />
                <label>期限</label>
                <input name="deadline" type="date" />
                <input type="submit" value="登録" />
            </form>
        </div>

        <div class ="taskList">
            <h2>現在のタスク一覧</h2>
        <table border="1" style="border-collapse: collapse;">
            <thead>
                <tr><th class="hidden">ID</th><th>タスク</th><th width="150">期限</th><th width="100">状態</th></tr>
            </thead>

            <tbody>
                    <tr th:each="task : ${TaskList}">
                        <td class ="hidden" th:text="${task.id}"></td>
                        <td th:text="${task.task}"></td>
                        <td th:text="${task.deadline}"></td>
                        <td th:text="${task.done} ? '完了' : '未完了'"></td>
                        <td width="50px">

                        <button type="submit" id="update_button" 
                            onclick="let row = this.PageTransitionEvent;
                            getElementById('update_id').value = row.cells[0].firstChild.data;
                            getElementById('update_task').value = row.cells[1].firstChild.data;
                            getElementById('update_deadline').value = row.cells[2].firstChild.data;
                            getElementById('update_status').selectedIndex = row.cells[3].firstChild.data === '完了' ? 1 : 0;
                            var dialog = getElementById('updateDialog');
                            dialog.style.left = ((window.innerWidth - 500) / 2) + 'px';
                            dialog.style.display = 'block';">
                            更新
                        </button>
                    </td>
                    <td width="50px">
                        <form action="/delete">
                            <button type="submit" id="delete_button">削除</button>
                            <input type="hidden" name="id" th:value="${task.id}" />
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

            <div id="updateDialog">
                <div class="task_form">
                    <h2>タスクの更新</h2>
                        <form action="/update">
                            <input type="hidden" name="id" id="update_id" />
                            <label>タスク</label>
                            <input name="task" type="text" id="update_task" />
                            <label>期限</label>
                            <input name="deadline" type="date" id="update_deadline" />
                            <label>状態</label>
                            <select name="done" id="update_done">
                                <option value="false">未完了</option>
                                <option value="true">完了</option>
                            </select>
                            <div>
                                <button type="submit">更新</button>
                                <button type="reset" onclick="getElementById('updateDialog').style.display='none';">キャンセル</button>
                            </div>
                        </form>
                </div>
            </div> 
    </body>
